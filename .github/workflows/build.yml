name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            platform: linux
          - os: ubuntu-24.04-arm
            arch: arm64
            platform: linux
          - os: macos-latest
            arch: arm64
            platform: macos
          - os: macos-13
            arch: amd64
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          ARCHIVE_NAME="wypas-core-${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p "${ARCHIVE_NAME}/lib" "${ARCHIVE_NAME}/include"
          cp build/libwypas-core.a "${ARCHIVE_NAME}/lib/"
          cp include/*.hpp "${ARCHIVE_NAME}/include/"
          cp wypas_core.hpp "${ARCHIVE_NAME}/"
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: wypas-core-${{ matrix.platform }}-${{ matrix.arch }}
          path: wypas-core-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.tar.gz
